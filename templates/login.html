    <div class="container">
        <div class="auth-card glass-panel">
            <div class="auth-header text-center">
                <i class="fa-solid fa-house-medical fa-3x text-info mb-3"></i>
                <h1>easyMed</h1>
                <p>Multi-Specialty Telemedicine Platform</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="profession">Profession</label>
                    <select id="profession" name="profession" class="form-control" required>
                        <option value="" disabled selected>Select your profession</option>
                        <option value="Patient">Patient</option>
                        <option value="Rural Doctor">Rural Doctor</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Oncologist">Oncologist</option>
                        <option value="Nephrologist">Nephrologist</option>
                        <option value="Pulmonologist">Pulmonologist</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>

                <div class="forgot-password">
                    <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="auth-footer">
                <p>New User? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
